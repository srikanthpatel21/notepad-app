<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srikanth Vodnala | Personal Site</title>
    <style>
        :root {
            --bg: #0b1020;
            --panel: rgba(15, 23, 42, 0.82);
            --panel-2: rgba(30, 41, 59, 0.65);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --accent-2: #818cf8;
            --border: rgba(148, 163, 184, 0.28);
            --ok: #34d399;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at 15% 10%, rgba(56, 189, 248, 0.16), transparent 38%),
                radial-gradient(circle at 80% 15%, rgba(129, 140, 248, 0.22), transparent 35%),
                linear-gradient(140deg, #0b1020, #111827 52%, #1e1b4b);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            width: min(1120px, 100%);
            margin: 0 auto;
            padding: 22px;
        }

        .hero {
            border: 1px solid var(--border);
            border-radius: 18px;
            background: var(--panel);
            backdrop-filter: blur(8px);
            box-shadow: 0 24px 60px rgba(2, 6, 23, 0.35);
            padding: 28px;
        }

        .hero h1 {
            margin: 0;
            font-size: clamp(1.7rem, 3vw, 2.5rem);
        }

        .hero p {
            color: var(--muted);
            margin: 8px 0 0;
            line-height: 1.6;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 8px 12px;
            border: 1px solid rgba(52, 211, 153, 0.4);
            color: var(--ok);
            border-radius: 999px;
            font-size: 0.88rem;
            background: rgba(16, 185, 129, 0.09);
        }

        .tabs {
            margin-top: 18px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tab {
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.72);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .tab:hover {
            background: rgba(30, 41, 59, 0.82);
        }

        .tab.active {
            background: linear-gradient(120deg, rgba(56, 189, 248, 0.22), rgba(129, 140, 248, 0.25));
            border-color: rgba(56, 189, 248, 0.7);
        }

        .panel {
            margin-top: 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            background: var(--panel-2);
            min-height: 330px;
        }

        .panel h2 {
            margin: 0 0 10px;
            font-size: 1.35rem;
        }

        .panel p, .panel li {
            color: var(--muted);
            line-height: 1.7;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 14px;
            margin-top: 12px;
        }

        .card {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            background: rgba(15, 23, 42, 0.55);
        }

        .card h3 {
            margin: 0 0 8px;
            font-size: 1rem;
        }

        .coming {
            font-size: 0.82rem;
            color: #a5b4fc;
            display: inline-block;
            margin-top: 10px;
            padding: 5px 8px;
            border-radius: 999px;
            border: 1px solid rgba(129, 140, 248, 0.45);
            background: rgba(99, 102, 241, 0.14);
        }

        footer {
            color: #64748b;
            text-align: center;
            margin-top: 22px;
            font-size: 0.87rem;
        }

        @media (max-width: 640px) {
            .container { padding: 12px; }
            .hero { padding: 18px; }
            .panel { padding: 14px; }
            .tab { width: 100%; text-align: left; }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="hero">
            <h1>Hi, I am Srikanth Vodnala</h1>
            <p>Welcome to my personal website. This space shares my profile, blog updates, learnings, and hands-on engineering projects across software and Arduino.</p>
            <span class="badge">Live site refresh in progress</span>

            <nav class="tabs" id="tabs">
                <button class="tab active" data-tab="about">About Srikanth</button>
                <button class="tab" data-tab="blogs">Blogs</button>
                <button class="tab" data-tab="learnings">Learnings</button>
                <button class="tab" data-tab="software">Software Projects</button>
                <button class="tab" data-tab="arduino">Arduino Projects</button>
            </nav>

            <article class="panel" id="panel"></article>
        </section>

        <footer>
            sriaknthvodnala.in | Built with Node.js + Express
        </footer>
    </div>

    <script>
        const tabsEl = document.getElementById("tabs");
        const panelEl = document.getElementById("panel");

        const sections = {
            about: `
                <h2>About Srikanth</h2>
                <p>I am a software enthusiast exploring backend development, web apps, cloud deployment, and electronics projects. I like building practical solutions and documenting my journey.</p>
                <div class="card-grid">
                    <div class="card">
                        <h3>Focus Areas</h3>
                        <p>Web development, API design, cloud deployments, automation, and embedded experimentation.</p>
                    </div>
                    <div class="card">
                        <h3>Current Goal</h3>
                        <p>Build a strong portfolio with real-world projects and consistent technical learning.</p>
                    </div>
                    <div class="card">
                        <h3>Location</h3>
                        <p>India</p>
                    </div>
                </div>
            `,
            blogs: `
                <h2>Blogs</h2>
                <p>Technical articles, build notes, and project retrospectives will be published here.</p>
                <div class="card-grid">
                    <div class="card">
                        <h3>First Blog Series</h3>
                        <p>From beginner projects to production-ready workflows.</p>
                        <span class="coming">Coming soon</span>
                    </div>
                    <div class="card">
                        <h3>Deployment Diaries</h3>
                        <p>Lessons learned from hosting apps on Raspberry Pi and cloud.</p>
                        <span class="coming">Coming soon</span>
                    </div>
                </div>
            `,
            learnings: `
                <h2>Learnings</h2>
                <p>A running list of concepts and tools I am currently exploring:</p>
                <ul>
                    <li>Node.js and Express fundamentals</li>
                    <li>Docker and Kubernetes hands-on practice</li>
                    <li>CI/CD basics and server operations</li>
                    <li>System design and API architecture</li>
                </ul>
                <span class="coming">Detailed notes coming soon</span>
            `,
            software: `
                <h2>Software Projects</h2>
                <p>Applications and experiments built using web and backend technologies.</p>
                <div class="card-grid">
                    <div class="card">
                        <h3>Portfolio Website</h3>
                        <p>This website revamp and future improvements.</p>
                    </div>
                    <div class="card">
                        <h3>Project Showcase</h3>
                        <p>A curated list of apps with source links and architecture notes.</p>
                        <span class="coming">Coming soon</span>
                    </div>
                </div>
            `,
            arduino: `
                <h2>Arduino Projects</h2>
                <p>Electronics prototypes, IoT ideas, and hardware-software integrations.</p>
                <div class="card-grid">
                    <div class="card">
                        <h3>Sensor Monitoring</h3>
                        <p>Basic monitoring and data logging concepts.</p>
                        <span class="coming">Coming soon</span>
                    </div>
                    <div class="card">
                        <h3>Home Automation</h3>
                        <p>Automated control experiments using microcontrollers.</p>
                        <span class="coming">Coming soon</span>
                    </div>
                </div>
            `
        };

        function setActive(tabId) {
            const tabButtons = tabsEl.querySelectorAll(".tab");
            tabButtons.forEach((btn) => {
                const isCurrent = btn.dataset.tab === tabId;
                btn.classList.toggle("active", isCurrent);
            });
            panelEl.innerHTML = sections[tabId] || sections.about;
        }

        tabsEl.addEventListener("click", (event) => {
            const button = event.target.closest(".tab");
            if (!button) return;
            setActive(button.dataset.tab);
        });

        setActive("about");
    </script>
</body>
</html>
